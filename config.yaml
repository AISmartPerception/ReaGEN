# Logging Configuration
logging:
  # Log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  level: "INFO"
  # Whether to log to console
  console: true
  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Generation Configuration
generation:
  # Random seed for reproducible generation (set to null for random behavior)
  # Whether to use deterministic CUDA operations (may impact performance)
  deterministic: true

# Evaluation Configuration
evaluation:
  # Reference key for answers in dataset
  ref_key: "possible_answers"
  # Whether to generate attention heatmaps
  generate_heatmap: false
  # Batch size for evaluation
  batch_size: 1


# Debug Configuration
debug:
  # Whether to enable debug mode
  enabled: false
  # Whether to save intermediate outputs
  save_intermediate: false
  # Debug output directory
  output_dir: "debug_outputs"

gen_training:
  full_data: False
  test_length: 100
  batch_size: 64
  shuffle: True
  num_workers: 4
  epochs: 300

  lr: 1e-4
  weight_decay: 0.001


  attn: True
  i_q: False
  
  setup: 1

  test_iterations: 5

  test_data: True
  # Options: MathVision, MMStar
  test_model: "composite"
  # test_model: "MMStar"
  # test_model: "MathVision"
  branch: 5


  token_cost: False