  test_ids_file: "data/test_ids.pkl"

  search_space_dir: "/searchspace"
  stage_outputs_dir: "/stage_output"

  token_cost_samples_dir: "token_cost_samples"

  

# Inference Configuration
inference:
  iterations: 30
  len_data: 5
  topk: 3


  attn: True

  prompt_refine: False
  CoT: False
  mini: False
  stages: []
  
  # stages_pool: ["BBOX", "SCENE.SUMMARY", "QUESTION.PARSING", "TEXT.DETECTION", "COUNT", "COLOR.ATTRIBUTE", "SPATIAL.RELATION"]
  stages_pool: ["TASK.INTERPRETATION", 
              "VISUAL.OBSERVATION", 
              "TEXTUAL.UNDERSTANDING", 
              "CONTEXTUAL.LINKING", 
              "FACT.EXTRACTION", 
              "VARIABLE.DEFINITION", 
              "RELATIONAL.REASONING", 
              "QUANTITATIVE.REASONING", 
              "LOGICAL.FILTERING",
              "HYPOTHESIS.GENERATION",
              "CROSSMODAL.ALIGNMENT",
              "SELFCONSISTENCY.CHECK",
              "COMPARATIVE.EVALUATION",
              "EXPLANATION.GENERATION"]

  

  TASK.INTERPRETATION:
    temperature: 0
    do_sample: False
    num_beams: 1
    max_new_tokens: 128

  VISUAL.OBSERVATION:
    temperature: 0
    do_sample: False
    num_beams: 1
    max_new_tokens: 128

  TEXTUAL.UNDERSTANDING:
    temperature: 0
